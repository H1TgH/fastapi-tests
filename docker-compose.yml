services:
  backend:
    container_name: backend
    build:
      context: ./backend
    command: [ "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]
    depends_on:
      alembic:
        condition: service_completed_successfully
    env_file:
      - ".env"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  bd:
    container_name: bd
    image: postgres:16-alpine
    env_file:
      - ".env"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER" ]
      interval: 5s
      timeout: 5s
      retries: 5

  bd_admin:
    container_name: bd_admin
    image: dpage/pgadmin4:8
    depends_on:
      - bd
    env_file:
      - ".env"
    ports:
      - "5051:80"

  alembic:
    container_name: alembic
    build:
      context: ./backend
    command: [ "alembic", "upgrade", "head" ]
    depends_on:
      bd:
        condition: service_healthy
    env_file:
      - ".env"
    volumes:
      - ./backend:/app

  aws:
    container_name: aws
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - ".env"
    volumes:
      - minio_data:/data

  frontend:
    container_name: frontend
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  postgres_data:
  minio_data:
